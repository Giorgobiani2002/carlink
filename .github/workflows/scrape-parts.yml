name: Scrape car parts

# Refreshes the car_parts catalogue once a month (and on manual trigger).
# Upserts by external_id, so prices/stock update and new 2020+ models get added.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   SUPABASE_URL          e.g. https://xxxx.supabase.co
#   SUPABASE_SERVICE_KEY  the service-role key (needed for storage uploads)

on:
  schedule:
    - cron: "0 3 1 * *" # 03:00 UTC on the 1st of every month
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/scrape_autopia.py
